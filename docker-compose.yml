services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=gha
    image: activity-control:latest
    container_name: activity-control-prod
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./dev.db:/app/dev.db
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
